<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel</title>

    <link rel="stylesheet" href="/css/dashboard.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="sidebar">

        <div class="logo-area">

            <img src="/images/logo.png" class="logo">

            <div class="empresa-info">

                <h3>Oncoclínicas</h3>

                <span>Sistema Interno</span>

            </div>

        </div>


        <div class="menu">

            <a href="/dashboard.html" class="active">📊 Dashboard</a>

            <a href="/usuarios.html">👥 Usuários</a>

            <a href="/produtos.html">📋 Cadastro de produtos</a>

            <a href="/estoque.html">📦 Estoque</a>

            <a href="/entrada-nota.html"><i class="fa-solid fa-file-import"></i>Entrada de Notas</a>

            <a href="/solicitacoes.html"><i class="fa-solid fa-box-open"></i>Solicitações</a>

            <a href="/relatorios.html">📈 Relatórios</a>

        </div>

        <div class="sidebar-footer">

            <button onclick="logout()">
                Sair
            </button>

        </div>

    </div>

   <div class="content">

    <div class="topbar">

        <h2>Bem-vindo</h2>

        <span id="dataAtual"></span>

    </div>

    <div class="banner">

        <img src="/images/empresa.jpg"
             class="banner-img">

    </div>

    <!-- CARDS -->

    <div class="cards">

        <div class="card">

            <i class="fa-solid fa-users"></i>

            <h3>Usuários</h3>

            <p id="totalUsuarios">0</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-file-import"></i>

            <h3>Entradas</h3>

            <p id="totalEntradas">0</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-clipboard-list"></i>

            <h3>Solicitações</h3>

            <p id="totalSolicitacoes">0</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-boxes-stacked"></i>

            <h3>Estoque</h3>

            <p id="totalEstoque">0</p>

        </div>

    </div>

</div>

<script src="/js/dashboard.js"></script>

</body>

</html>
