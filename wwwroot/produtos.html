<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Cadastro de Produtos</title>

    <link rel="stylesheet"
          href="/css/dashboard.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="sidebar">

        <div class="logo-area">

            <img src="/images/logo.png"
                 class="logo">

            <div class="empresa-info">

                <h3>Oncoclínicas</h3>

                <span>Sistema Interno</span>

            </div>

        </div>

        <div class="menu">

            <a href="/dashboard.html">
                📊 Dashboard
            </a>

            <a href="/usuarios.html">
                👥 Usuários
            </a>

            <a href="/produtos.html"
               class="active">
                📋 Cadastro de Produtos
            </a>

            <a href="/estoque.html">
                📦 Estoque
            </a>

            <a href="/entrada-nota.html">
                <i class="fa-solid fa-file-import"></i>
                Entrada de Notas
            </a>

            <a href="/saida-nota.html">
                <i class="fa-solid fa-file-export"></i>
                Saída de Notas
            </a>

            <a href="/relatorios.html">
                📈 Relatórios
            </a>

        </div>

        <div class="sidebar-footer">

            <button onclick="logout()">
                Sair
            </button>

        </div>

    </div>

    <div class="content">

        <div class="topbar">

            <h2>Cadastro de Produtos</h2>

            <span id="dataAtual"></span>

        </div>

        <div class="card-form">

            <div class="page-header">

                <h3>Dados do Produto</h3>

                <button
                     class="btn-edit"
                     onclick="salvarProduto()">

                     Salvar Produto

                     </button>

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>Código</label>

                    <input
                         id="codigo"
                         type="text"
                         class="form-control"
                         placeholder="Código do produto">

                </div>

                <div class="form-group">

                    <label>Descrição</label>

                    <input
                        id="descricao"
                        type="text"
                        class="form-control"
                        placeholder="Descrição do produto">
                </div>

                <div class="form-group">

                    <label>Categoria</label>

                    <select id="categoria"
                      class="form-control">

                        <option>Selecione</option>
                        <option>Medicamentos</option>
                        <option>Materiais Hospitalares</option>
                        <option>Escritório</option>
                        <option>Limpeza</option>
                        <option>TI</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Unidade</label>

                    <select  id="unidade" class="form-control">

                        <option>UN</option>
                        <option>CX</option>
                        <option>KG</option>
                        <option>LT</option>
                        <option>PCT</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Fornecedor</label>

                    <input
                         id="fornecedor"
                         type="text"
                         class="form-control"
                         placeholder="Fornecedor">

                </div>

                <div class="form-group">

                    <label>Estoque Mínimo</label>

                    <input
                         id="estoqueMinimo"
                         type="number"
                         class="form-control"
                         placeholder="Quantidade mínima">

                </div>

                <div class="form-group">

                    <label>Observações</label>

                    <input
                         id="observacao"
                         type="text"
                         class="form-control"
                         placeholder="Informações adicionais">

                </div>

            </div>

        </div>

        <div class="card-form">

            <div class="page-header">

                <h3>Produtos Cadastrados</h3>

                <button class="btn-edit">

                    Atualizar

                </button>

            </div>

            <table id="tabelaProdutos"
            class="users-table">

                <thead>

                    <tr>

                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Unidade</th>
                        <th>Fornecedor</th>
                        <th>Estoque Mínimo</th>
                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td colspan="7"
                            style="text-align:center;">

                            Nenhum produto cadastrado

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/dashboard.js"></script>
    <script src="/js/produtos.js"></script>

</body>

</html>
