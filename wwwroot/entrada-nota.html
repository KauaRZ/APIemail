<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Entrada de Notas</title>

    <link rel="stylesheet"
          href="/css/dashboard.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="sidebar">

        <div class="logo-area">

            <img src="/images/logo.png"
                 class="logo">

            <div class="empresa-info">

                <h3>Oncoclínicas</h3>

                <span>Sistema Interno</span>

            </div>

        </div>

        <div class="menu">

            <a href="/dashboard.html">
                📊 Dashboard
            </a>

            <a href="/usuarios.html">
                👥 Usuários
            </a>

            <a href="/produtos.html">
                📋 Cadastro de Produtos
            </a>

            <a href="/estoque.html">
                📦 Estoque
            </a>

            <a href="/entrada-nota.html"
               class="active">
                📥 Entrada de Notas
            </a>

            <a href="/saida-nota.html">
                🚚 Saída de Notas
            </a>

            <a href="/relatorios.html">
                📈 Relatórios
            </a>

        </div>

        <div class="sidebar-footer">

            <button onclick="logout()">
                Sair
            </button>

        </div>

    </div>

    <div class="content">

        <div class="topbar">

            <h2>Entrada de Notas</h2>

            <span id="dataAtual"></span>

        </div>

        <div class="card-form">

            <h3>Dados da Nota</h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>Fornecedor</label>

                    <input
                        class="form-control">

                </div>

                <div class="form-group">

                    <label>Número da Nota</label>

                    <input
                        class="form-control">

                </div>

                <div class="form-group">

                    <label>Data de Entrada</label>

                    <input
                        type="date"
                        class="form-control">

                </div>

                <div class="form-group">

                    <label>Observações</label>

                    <input
                        class="form-control">

                </div>

            </div>

        </div>

        <div class="card-form">

            <div class="page-header">

                <h3>Itens da Nota</h3>

                <button class="btn-edit">

                    + Adicionar Item

                </button>

            </div>

            <table class="users-table">

                <thead>

                    <tr>

                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Lote</th>
                        <th>Validade</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td colspan="4"
                            style="text-align:center;">

                            Nenhum item adicionado

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <div style="text-align:right;">

            <button class="btn-edit">

                Lançar Entrada

            </button>

        </div>

    </div>

    <script src="/js/dashboard.js"></script>

</body>

</html>
